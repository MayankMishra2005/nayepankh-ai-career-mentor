services:
  - type: web
    name: nayepankh-career-mentor
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port=$PORT --server.address=0.0.0.0
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: LLM_GEMINI_FALLBACK
        value: "0"
        sync: false
